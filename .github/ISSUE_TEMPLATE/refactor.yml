name: Refactor
description: 리팩토링, 구조 개선용 이슈
title: "[REFACTOR] "
labels:
  - refactor
body:
  - type: textarea
    id: asis
    attributes:
      label: 현재 문제점
      description: 현재 구조의 문제를 작성해주세요.
      placeholder: 예) 서비스 계층에 책임이 과도하게 집중되어 있습니다.
    validations:
      required: true

  - type: textarea
    id: tobe
    attributes:
      label: 개선 방향
      description: 어떻게 개선할지 작성해주세요.
      placeholder: 예) 도메인별 책임을 분리하고, 검증 로직을 별도 객체로 이동합니다.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      placeholder: |
        - [ ] 구조 분석
        - [ ] 클래스 분리
        - [ ] 테스트 수정
        - [ ] 문서 반영
    validations:
      required: true