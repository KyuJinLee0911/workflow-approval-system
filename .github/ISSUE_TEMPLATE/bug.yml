name: Bug
description: 버그 수정용 이슈
title: "[FIX] "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했는지 작성해주세요.
      placeholder: 예) 회원 조회 API 호출 시 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 작성해주세요.
      placeholder: 예) 존재하는 회원이면 정상적으로 조회되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 원인 후보
      description: 추정 원인이 있다면 작성해주세요.
      placeholder: 예) Optional 처리 누락, NPE 가능성
    validations:
      required: false

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      placeholder: |
        - [ ] 재현 테스트 작성
        - [ ] 원인 분석
        - [ ] 수정
        - [ ] 회귀 테스트
    validations:
      required: true